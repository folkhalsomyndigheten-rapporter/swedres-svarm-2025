
               
<!-- Konfigurera Content Security Policy (CSP)
Mål: Blockera externa script och skydda mot XSS-attacker.
Hur?


Lägg till CSP i era HTML-filer:

I er anpassade header.html (eller direkt i Quarto-dokumenten)

-->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               img-src 'self' data:;
               font-src 'self' https://fonts.gstatic.com;">

<!-- 
Förklaring:

'self': Tillåter endast resurser från er egen domän.
'unsafe-inline': Tillåter inline-script och -stilar (nödvändigt för htmlwidgets).
data:: Tillåter data-URL:er (t.ex. för bilder i diagram).
connect-src 'none': Blockera alla externa anslutningar (t.ex. till API:er).


-->
